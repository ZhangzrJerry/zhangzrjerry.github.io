site_name: ZhangzrJerry
site_description: "Jerry's personal website"

plugins:  
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 简体中文
          build: true
      nav_translations:
        zh:
          Home: 首页
          Resume: 简历
          Projects: 项目
  # - blog

nav:
  - Home: index.md
  - Resume: resume.md
  - Projects: projects.md
  # - Blogs: blog/index.md

theme:
  name: material
  language: en
  favicon: img/favicon.ico
  logo: img/favicon.ico
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.path
    - navigation.tracking
    - navigation.sidebar
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - content.image.lightbox
    - content.card
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_css:
  - stylesheets/index.css
  - stylesheets/projects.css
  - stylesheets/blog.css
  - stylesheets/resume.css

extra_javascript:
  - javascripts/projects.js

markdown_extensions:
  - attr_list
  - md_in_html
  - codehilite:
      guess_lang: false

extra:
    social:
        - icon: fontawesome/regular/envelope
          link: https://zhangzrjerry@outlook.com
        - icon: fontawesome/brands/github
          link: https://github.com/ZhangzrJerry

