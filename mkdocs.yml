site_name: ZhangzrJerry
site_description: "Jerry's personal website"

plugins:  
  - search
  - blog

nav:
  - Home: index.md
  - Resume: resume/index.md
  # - Academics: academics.md
  - Projects: projects.md
  - Blogs: blog/index.md
  - Connect: connect.md

theme:
  name: material
  language: en
  custom_dir: overrides
  favicon: img/favicon.ico
  logo: img/favicon.ico
  features:
    - search.suggest
    - search.highlight
    - search.share
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.path
    - navigation.tracking
    - navigation.sidebar
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - content.image.lightbox
    - content.card
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_css:
  - stylesheets/index.css
  - stylesheets/blog.css
  - stylesheets/resume.css
  - stylesheets/academics.css

extra_javascript:
  - javascripts/index.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - codehilite:
      guess_lang: false

extra:
    social:
        - icon: fontawesome/regular/envelope
          link: https://zhangzrjerry@outlook.com
        - icon: fontawesome/brands/github
          link: https://github.com/ZhangzrJerry

